name: Provision Student Repository

on:
  issues:
    types: [opened]
    
concurrency:
  group: enrollment-queue
  cancel-in-progress: false # Forces GitHub to queue them sequentially to handle multiple students

jobs:
  create-repo:
    if: contains(github.event.issue.labels.*.name, 'provision-repo')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Enrollment Repository
        # We must clone our own repo first to read and edit the pg2Info.txt file
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.ORG_ADMIN_TOKEN }}
          
          
      - name: Parse and Validate Student Email Hash
        id: code_check
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Parse the email input block following the Markdown form title
          STUDENT_EMAIL=$(echo "$ISSUE_BODY" | sed -n '/### University Email Address/{n;p;}' | tr -d '[:space:]')
          if [ -z "$STUDENT_EMAIL" ] || [ "$STUDENT_EMAIL" = "_No_response_" ]; then
            STUDENT_EMAIL=$(echo "$ISSUE_BODY" | sed -n '/### University Email Address/{n;n;p;}' | tr -d '[:space:]')
          fi
          
          # 2. Normalize to lowercase and cryptographically hash the student email
          CLEAN_EMAIL=$(echo "$STUDENT_EMAIL" | tr '[:upper:]' '[:lower:]')
          STUDENT_HASH=$(echo -n "$CLEAN_EMAIL" | sha256sum | awk '{print $1}')
          
          
          # ==================== PRIVACY REDACTION START ====================
          # Create an obfuscated version of the issue body, swapping plaintext for the hash
          # This replaces the student's actual email text with their scrambled hash block
          REDACTED_BODY=$(echo "$ISSUE_BODY" | sed "s/$STUDENT_EMAIL/[REDACTED_HASH: $STUDENT_HASH]/g")
          
          # Push the redacted text back to GitHub to instantly overwrite the public text record
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$REDACTED_BODY"
          # ==================== PRIVACY REDACTION END ====================


          
          echo "Checking if email hash exists on the course roster..."
          
          # 3. Look for the generated hash inside our public pg2Info.txt file
          if grep -Fxq "$STUDENT_HASH" pg2Info.txt; then
            echo "CODE_VALID=true" >> $GITHUB_ENV
            
            # 4. Extract the global prefix from the first line of pg2Info.txt            
            REPO_PREFIX=$(grep "# PREFIX:" pg2Info.txt | head -n1 | sed 's/# PREFIX: //g' | tr -d '[:space:]')
            
            # 5. Extract the template repository name from the second line of codes.txt
            TEMPLATE_NAME=$(grep "# TEMPLATE:" pg2Info.txt | head -n1 | sed 's/# TEMPLATE: //g' | tr -d '[:space:]')
            
            # Form the custom dynamic repository name
            STUDENT_USER="${{ github.event.issue.user.login }}"
            RESOLVED_REPO_NAME="${REPO_PREFIX}${STUDENT_USER}"
            
            # Save the name into the global environment scope for downstream steps
            echo "DYNAMIC_REPO_NAME=$RESOLVED_REPO_NAME" >> $GITHUB_ENV
            echo "DYNAMIC_TEMPLATE_NAME=$TEMPLATE_NAME" >> $GITHUB_ENV

            echo "Validated student workspace target name: $RESOLVED_REPO_NAME"
            echo "Target starter code template: $TEMPLATE_NAME"
            
            # Permanently delete the matched email hash string from the file
            sed -i "/^$STUDENT_HASH$/d" pg2Info.txt

          else
            echo "CODE_VALID=false" >> $GITHUB_ENV
            echo "::error::Submitted email is not on the roster or has already registered."
          fi


      - name: Burn Code and Commit Changes
        if: env.CODE_VALID == 'true'
        run: |
          # Configure local identity settings to save the modified pg2Info.txt file
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # Track, record, and push the updated list back to GitHub
          git add pg2Info.txt
          git commit -m "Burn claim code used by ${{ github.event.issue.user.login }}"
          git push

      - name: Handle Invalid Claim Code
        if: env.CODE_VALID == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --repo "$GITHUB_REPOSITORY" --body "❌ **Repository Creation Failed:** The claim code you entered is invalid or has already been used by another student. Please double-check your assigned code and try opening a new issue."
          gh issue close $ISSUE_NUMBER --repo "$GITHUB_REPOSITORY" --reason "not_planned"
          exit 1

      - name: Check If Repository Already Exists
        id: repo_check
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          ORG: "FullSailGameStudies"
          NEW_REPO_NAME: ${{ env.DYNAMIC_REPO_NAME }}
        run: |
          # Check if the repository can be resolved by the GitHub CLI
          if gh repo view "$ORG/$NEW_REPO_NAME" > /dev/null 2>&1; then
            echo "REPO_EXISTS=true" >> $GITHUB_ENV
            echo "::warning::Repository $ORG/$NEW_REPO_NAME already exists. Skipping creation."
          else
            echo "REPO_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Handle Duplicate Repository Request
        if: env.REPO_EXISTS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ORG: "FullSailGameStudies"
          STUDENT: ${{ github.event.issue.user.login }}
          NEW_REPO_NAME: ${{ env.DYNAMIC_REPO_NAME }}
        run: |
          gh issue comment $ISSUE_NUMBER \
            --repo "$GITHUB_REPOSITORY" \
            --body "⚠️ @$STUDENT You have already requested an assignment repository for this project. 
          
          Your active private workspace is located here: **https://github.com/${ORG}/${NEW_REPO_NAME}**
          
          This duplicate request issue has been closed automatically to prevent overwriting your existing code."
          
          gh issue close $ISSUE_NUMBER \
            --repo "$GITHUB_REPOSITORY" \
            --reason "completed"
          exit 0 # Exit gracefully without failing the workflow run entirely

      - name: Generate and Invite
        # This step only executes if the passcode is correct AND the repo doesn't exist yet
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          ORG: "FullSailGameStudies"
          TEMPLATE_REPO: ${{ env.DYNAMIC_TEMPLATE_NAME }}
          STUDENT: ${{ github.event.issue.user.login }}
          NEW_REPO_NAME: ${{ env.DYNAMIC_REPO_NAME }}
        run: |
          echo "Creating private repository $NEW_REPO_NAME from template..."
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/$ORG/$TEMPLATE_REPO/generate \
            -f owner="$ORG" \
            -f name="$NEW_REPO_NAME" \
            -F private=true

          sleep 5

          echo "Adding student $STUDENT as a collaborator..."
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /repos/$ORG/$NEW_REPO_NAME/collaborators/$STUDENT \
            -f permission='write'

      - name: Initialize Feedback Branch and PR
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          ORG: "FullSailGameStudies"
          NEW_REPO_NAME: ${{ env.DYNAMIC_REPO_NAME }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${NEW_REPO_NAME}.git"
          cd $NEW_REPO_NAME
          
          git checkout master
          git checkout -b feedback
          git push origin feedback
          
          # Create an empty commit so the PR has something to compare against          
          git checkout master
          git commit --allow-empty -m "Initialize assignment feedback environment"
          git push origin master
          
          gh pr create \
            --repo "$ORG/$NEW_REPO_NAME" \
            --title "Grading and Feedback" \
            --body "This Pull Request tracks your progress. Instructors will leave reviews here. Do not close or merge." \
            --base "feedback" \
            --head "master"

      - name: Close Issue and Reply to Student
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ORG: "FullSailGameStudies"
          STUDENT: ${{ github.event.issue.user.login }}
          NEW_REPO_NAME: ${{ env.DYNAMIC_REPO_NAME }}
        run: |
          gh issue comment $ISSUE_NUMBER \
            --repo "$GITHUB_REPOSITORY" \
            --body "@${STUDENT}, Private repository successfully configured at **https://github.com/${ORG}/${NEW_REPO_NAME}**!"
          gh issue close $ISSUE_NUMBER \
            --repo "$GITHUB_REPOSITORY" \
            --reason "completed"
